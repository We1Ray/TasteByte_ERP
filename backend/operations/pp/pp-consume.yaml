operation_code: PP-CONSUME
name: "生產用料確認"
description: "記錄生產工單實際用料與產出，計算耗用差異"
module: PP
operation_type: FORM
project_code: LCP-100
is_published: true
version: 1

sidebar:
  icon: Factory
  sort_order: 30

form:
  layout: {}
  settings: {}
  sections:
    - title: "工單資訊"
      columns: 2
      fields:
        - field_name: production_order
          label: "生產工單號"
          type: TEXT
          required: true
          searchable: true

        - field_name: product_name
          label: "產品名稱"
          type: TEXT
          required: true
          searchable: true

        - field_name: work_date
          label: "作業日期"
          type: DATE
          required: true
          default_value_sql: "SELECT CURRENT_DATE::TEXT"

        - field_name: shift
          label: "班別"
          type: DROPDOWN
          required: true
          options:
            - label: "早班"
              value: DAY
            - label: "晚班"
              value: NIGHT
            - label: "全天"
              value: FULL

    - title: "用料記錄"
      columns: 1
      fields:
        - field_name: consumption_items
          label: "用料記錄"
          type: MASTER_DETAIL
          required: true
          sub_table_columns:
            - field_key: material_consumed
              label: "投入原料"
              field_type: text
              required: true
            - field_key: planned_qty
              label: "計畫用量"
              field_type: number
              required: true
            - field_key: actual_qty
              label: "實際用量"
              field_type: number
              required: true
            - field_key: variance
              label: "差異"
              field_type: number

    - title: "產出記錄"
      columns: 2
      fields:
        - field_name: output_qty
          label: "產出數量"
          type: NUMBER
          required: true

        - field_name: defect_qty
          label: "不良品數量"
          type: NUMBER

        - field_name: yield_rate
          label: "良率 (%)"
          type: NUMBER

        - field_name: production_notes
          label: "生產備註"
          type: TEXTAREA
          column_span: 2

calculation_formulas:
  - target_field: yield_rate
    formula: "output_qty / (output_qty + defect_qty) * 100"
    trigger_fields:
      - output_qty
      - defect_qty
    description: "良率 = 良品 / (良品+不良品) x 100"

output_rules:
  - name: "低良率通知品管"
    trigger_event: ON_CREATE
    output_type: NOTIFICATION
    recipient_type: STATIC
    recipient_value: "a0000000-0000-0000-0000-000000000007"
