# ============================================================
# TasteByte ERP — Nginx Reverse Proxy Configuration
# Production-ready with security headers, rate limiting, gzip
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time '
                    'rid=$upstream_http_x_request_id';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ── Rate Limiting ────────────────────────────────────────
    # Auth endpoints: 10 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # General API: 100 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # ── Upstreams ────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream web {
        server web:3000;
        keepalive 16;
    }

    # ── Server Block ─────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Default client body size
        client_max_body_size 10m;

        # ── Connection Timeouts ──────────────────────────────
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # ── Common Proxy Headers ─────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # ── Security Headers ─────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Auth API — Rate Limited ──────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
        }

        # ── Upload Endpoints — Larger Body Size ──────────────
        location ~ ^/api/v1/.*/upload {
            client_max_body_size 50m;
            proxy_request_buffering off;

            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend;
        }

        # ── API Routes ───────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://backend;
        }

        # ── Health Check ─────────────────────────────────────
        location /health {
            proxy_pass http://backend;
        }

        # ── Next.js Static Assets ────────────────────────────
        location /_next/static/ {
            proxy_pass http://web;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Web Frontend (catch-all) ─────────────────────────
        location / {
            proxy_pass http://web;
        }
    }
}
